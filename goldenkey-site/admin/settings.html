<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostazioni - Pannello Admin GoldenKey</title>
    <!-- Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&family=Plus+Jakarta+Sans:wght@200..800&display=swap">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Admin Panel Styles -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../assets/images/logo-gk.png" alt="GoldenKey"
                onerror="this.src='https://via.placeholder.com/150x50/1a361a/ffffff?text=GoldenKey'">
            <p>Admin Workspace</p>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>
            <a href="properties.html" class="nav-item">
                <i class="fa-solid fa-key"></i> Immobili
            </a>
            <a href="requests.html" class="nav-item">
                <i class="fa-solid fa-envelope"></i> Richieste
            </a>
            <a href="landing.html" class="nav-item">
                <i class="fa-solid fa-bullhorn"></i> Promo Landing
            </a>
            <a href="settings.html" class="nav-item active">
                <i class="fa-solid fa-gear"></i> Impostazioni
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="btn-logout" onclick="logoutAdmin(event)">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Esci
            </a>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="main-content">
        <div class="topbar">
            <h1 class="page-title">Impostazioni Account</h1>
        </div>

        <div class="form-section">
            <h2 class="section-title"><i class="fa-solid fa-shield-halved"></i> Modifica Credenziali Accesso</h2>

            <form id="settingsForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Nuova Email di Accesso</label>
                        <input type="email" id="newEmail" class="form-control" placeholder="Inserisci la nuova email">
                        <p style="font-size: 0.8rem; color: var(--admin-text-muted); margin-top: 5px;">Lascia vuoto se
                            non vuoi modificarla.</p>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">Nuova Password</label>
                        <input type="password" id="newPassword" class="form-control"
                            placeholder="Inserisci la nuova password">
                        <p style="font-size: 0.8rem; color: var(--admin-text-muted); margin-top: 5px;">Lascia vuoto se
                            non vuoi modificarla. (Minimo 6 caratteri)</p>
                    </div>

                    <!-- RE-AUTHENTICATION REQUIRED BY FIREBASE -->
                    <div class="form-group full-width"
                        style="margin-top: 20px; border-top: 1px solid var(--admin-border); padding-top: 20px;">
                        <label class="form-label" style="color: var(--admin-danger);">* Per confermare le modifiche,
                            inserisci la Password Attuale</label>
                        <input type="password" id="currentPassword" class="form-control" placeholder="Password attuale"
                            required>
                    </div>
                </div>

                <div style="margin-top: 30px; text-align: right;">
                    <button type="button" class="btn-save" id="btnUpdateSettings">
                        <i class="fa-solid fa-floppy-disk"></i> Salva Modifiche
                    </button>
                    <p id="settingsMsg" style="margin-top: 15px; font-weight: bold;"></p>
                </div>
            </form>
        </div>
    </main>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Configurazione Database & Auth -->
    <script src="/js/firebase-config.js"></script>
    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/settings.js"></script>

    <!-- Guardia di sicurezza -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
        });
    </script>
</body>

</html>
