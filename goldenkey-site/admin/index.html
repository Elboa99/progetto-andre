<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GoldenKey</title>
    <!-- Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&family=Plus+Jakarta+Sans:wght@200..800&display=swap">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #1a361a;
            --accent: #bfa15f;
            --bg: #f4f6f8;
            --text: #333;
            --border: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            width: 180px;
            margin-bottom: 30px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #2a4a2a;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Usa un placeholder finché non hai il path corretto per l'admin -->
        <img src="../assets/images/logo-gk.png" alt="GoldenKey" class="login-logo"
            onerror="this.src='https://via.placeholder.com/180x60?text=GoldenKey+Logo'">

        <h1 class="login-title">Pannello Gestione</h1>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group mb-4">
                <label class="form-label" for="email">Indirizzo Email</label>
                <input type="email" id="email" class="form-control" placeholder="es. info@goldenkey.com" required>
            </div>

            <div class="form-group mb-5">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required
                        style="padding-right: 40px;">
                    <i class="fa-solid fa-eye" id="togglePassword"
                        style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: #666;"
                        onclick="togglePwd()"></i>
                </div>
            </div>

            <div id="auth-error"
                style="display: none; color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 500;">
                <!-- Messaggio di errore iniettato da JS -->
            </div>

            <button type="submit" class="btn-login" onclick="loginAdmin(event)">
                Accedi al Pannello <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
            </button>
        </form>

        <a href="../index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Torna al sito principale
        </a>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Configurazione Database & Auth -->
    <script src="/js/firebase-config.js"></script>
    <script src="/admin/js/auth.js"></script>

    <!-- Previeni Login se già loggato e Script Occhio Password -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfLoggedIn();
        });

        function togglePwd() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                pwdInput.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>

</html>
